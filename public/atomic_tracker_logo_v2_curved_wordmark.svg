<text text-anchor="middle" font-family="var(--font-sans)" font-size="22" font-weight="500" fill="#1e3a8a" letter-spacing="3" style="fill:rgb(30, 58, 138);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:22px;font-weight:500;text-anchor:middle;dominant-baseline:auto">
  <textPath href="#textOrbit" startOffset="50%" style="fill:rgb(30, 58, 138);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:22px;font-weight:500;text-anchor:middle;dominant-baseline:auto">atomic tracker</textPath>
